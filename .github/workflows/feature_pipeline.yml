name: Feature Pipeline (Hourly)

# Hourly incremental ingestion with optional catch-up (default 48 h gap fill):
# OpenWeather fetch → raw_data upsert → single-row feature engineering → features upsert.
# Full historical features require a one-time backfill.py run beforehand.

on:
  schedule:
    - cron: "0 * * * *"   # every hour at :00
  workflow_dispatch:        # GitHub UI manual trigger

jobs:
  hourly-feature-pipeline:
    name: "Fetch → Store Raw → Engineer 1 Feature Row → Store"
    runs-on: ubuntu-latest
    timeout-minutes: 10

    env:
      OPENWEATHER_API_KEY: ${{ secrets.OPENWEATHER_API_KEY }}
      MONGODB_URI: ${{ secrets.MONGODB_URI }}
      DB_NAME: ${{ secrets.DB_NAME }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run incremental hourly pipeline
        run: python src/hourly_pipeline.py --catchup-hours 48

      - name: Log completion
        run: echo "Hourly pipeline complete at $(date -u)"
