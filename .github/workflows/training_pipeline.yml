name: Training Pipeline (Daily)

# Daily train.py: 12 pollutant targets × four algorithms, best model per target
# saved locally, uploaded to Hugging Face Hub, metadata mirrored in MongoDB.

on:
  schedule:
    - cron: "0 2 * * *"   # daily at 02:00 UTC
  workflow_dispatch:        # GitHub UI manual trigger

jobs:
  train:
    name: "Train → HF Hub Upload → MongoDB Metadata"
    runs-on: ubuntu-latest
    timeout-minutes: 60

    # MongoDB, OpenWeather, Hugging Face credentials
    env:
      # Data pipeline (MongoDB + OpenWeather)
      OPENWEATHER_API_KEY: ${{ secrets.OPENWEATHER_API_KEY }}
      MONGODB_URI:         ${{ secrets.MONGODB_URI }}
      DB_NAME:             ${{ secrets.DB_NAME }}
      # Hugging Face Hub (model registry)
      HF_TOKEN:            ${{ secrets.HF_TOKEN }}
      HF_REPO_ID:          ${{ secrets.HF_REPO_ID }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      # train.py → model_registry.save_model → local pkl, HF upload, MongoDB metadata
      - name: Run training pipeline
        run: python src/train.py

      # Secondary backup of local .pkl artefacts (30-day retention)
      - name: Upload trained model artifacts
        uses: actions/upload-artifact@v4
        with:
          name: trained-models-${{ github.run_id }}
          path: models/
          retention-days: 30
          if-no-files-found: warn

      # ── 6. Log completion ─────────────────────────────────────────────────────
      - name: Log completion
        run: |
          echo "Training pipeline completed at $(date -u)"
          echo "Models uploaded to HF Hub repo: $HF_REPO_ID"
